name: Release Windows Zip

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and release Windows zip
    runs-on: windows-latest
    env:
      # Pin the openslide-bin release used for the build.
      # Update this when a new upstream release is available.
      OPENSLIDE_BIN_VERSION: "4.0.0.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$tag' is not a supported version tag" >&2
            exit 1
          fi

          version="${tag#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' app/Cargo.toml | head -n 1)"

          if [[ "$cargo_version" != "$version" ]]; then
            echo "Tag version '$version' does not match app/Cargo.toml version '$cargo_version'" >&2
            exit 1
          fi

          artifact_name="eov-${tag}-windows-x86_64.zip"
          checksum_name="${artifact_name}.sha256"

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "artifact_name=$artifact_name"
            echo "checksum_name=$checksum_name"
          } >> "$GITHUB_OUTPUT"

      - name: Download OpenSlide binaries
        shell: pwsh
        run: |
          $version = $env:OPENSLIDE_BIN_VERSION
          $asset = "openslide-bin-${version}-windows-x64.zip"
          $url = "https://github.com/openslide/openslide-bin/releases/download/v${version}/${asset}"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile openslide-bin.zip
          Expand-Archive -Path openslide-bin.zip -DestinationPath openslide-extract

          # Move the extracted subdirectory to a predictable path
          $extracted = Get-ChildItem -Path openslide-extract -Directory | Select-Object -First 1
          Move-Item -Path $extracted.FullName -Destination openslide

      - name: Generate MSVC import library for OpenSlide
        shell: pwsh
        run: |
          # Find the OpenSlide DLL
          $dll = Get-ChildItem -Path openslide\bin -Filter "libopenslide*.dll" |
              Where-Object { $_.Name -match '\.dll$' -and $_.Name -notmatch '\.dll\.' } |
              Select-Object -First 1

          if (-not $dll) {
            Write-Error "No OpenSlide DLL found in openslide\bin"
            exit 1
          }

          $dllName = $dll.Name
          Write-Host "Found OpenSlide DLL: $dllName"

          # Extract exports with dumpbin
          $output = & dumpbin /exports $dll.FullName
          $defLines = @("LIBRARY `"$dllName`"", "EXPORTS")
          $inExportTable = $false

          foreach ($line in $output) {
            if ($line -match '^\s+ordinal\s+hint\s+RVA\s+name') {
              $inExportTable = $true
              continue
            }
            if ($inExportTable) {
              if ($line -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)') {
                $defLines += "  $($Matches[1])"
              } elseif ($line.Trim() -eq '' -or $line -match '^\s+Summary') {
                break
              }
            }
          }

          $defPath = "openslide\lib\openslide.def"
          $defLines -join "`n" | Set-Content $defPath -Encoding ASCII
          Write-Host "Generated $defPath with $($defLines.Count - 2) exports"

          # Create the import library that matches #[link(name = "openslide")]
          lib /def:$defPath /out:openslide\lib\openslide.lib /machine:x64
          Write-Host "Created openslide\lib\openslide.lib"

      - name: Build release binary
        shell: pwsh
        run: |
          $libDir = Join-Path (Get-Location) "openslide" "lib"
          $env:RUSTFLAGS = "-L native=$libDir"
          cargo build --release --bin eov

      - name: Create zip archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging\eov -Force | Out-Null

          # Copy the release binary
          Copy-Item "target\release\eov.exe" "staging\eov\"

          # Copy all OpenSlide DLLs (openslide + its dependencies)
          Copy-Item "openslide\bin\*.dll" "staging\eov\"

          Write-Host "Zip contents:"
          Get-ChildItem -Path staging\eov | Format-Table Name, Length

          Compress-Archive -Path "staging\eov" -DestinationPath "${{ steps.meta.outputs.artifact_name }}"

          # Generate checksum
          $hash = (Get-FileHash "${{ steps.meta.outputs.artifact_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ steps.meta.outputs.artifact_name }}" | Set-Content "${{ steps.meta.outputs.checksum_name }}" -Encoding ASCII -NoNewline

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: eov ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.artifact_name }}
            ${{ steps.meta.outputs.checksum_name }}