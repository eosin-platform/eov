  #           if ! command -v slint-lsp >/dev/null; then
  #             cargo install --git https://github.com/slint-ui/slint slint-lsp
  #           fi
  #       - name: Check Slint formatting
  #         run: |
  #           set -euo pipefail
  #           # shellcheck disable=SC2046
  #           slint-lsp format -i $(git ls-files '*.slint')
  #           git diff --exit-code

  actionlint:
    name: Actionlint
    needs: skip-check
    if: needs.skip-check.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          version="1.7.12"
          curl -fsSL -o /tmp/actionlint.tgz \
            "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          sudo install -m 0755 /tmp/actionlint /usr/local/bin/actionlint
      - run: actionlint

  check:
    name: Cargo Clippy, & Test
    needs: skip-check
    if: needs.skip-check.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            git \
            libcairo2-dev \
            libgdk-pixbuf-2.0-dev \
            libglib2.0-dev \
            libjpeg-turbo8-dev \
            libopenjp2-7-dev \
            libpng-dev \
            libsqlite3-dev \
            libtiff-dev \
            libvulkan-dev \
            libfontconfig-dev \
            libfreetype6-dev \
            libxml2-dev \
            meson \
            ninja-build \
            protobuf-compiler \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev \
            pkg-config \
            zlib1g-dev
      - name: Build OpenSlide from source
        shell: bash
        run: |
          set -euo pipefail
          openslide_prefix="$RUNNER_TEMP/openslide-prefix"
          OPENSLIDE_PREFIX="$openslide_prefix" \
          OPENSLIDE_BUILD_ROOT="$RUNNER_TEMP/openslide-build" \
            bash packaging/shared/build-openslide.sh

          {
            echo "OPENSLIDE_PREFIX=$openslide_prefix"
            echo "OPENSLIDE_LIB_DIR=$openslide_prefix/lib"
            echo "PKG_CONFIG_PATH=$openslide_prefix/lib/pkgconfig${PKG_CONFIG_PATH+:$PKG_CONFIG_PATH}"
            echo "LD_LIBRARY_PATH=$openslide_prefix/lib${LD_LIBRARY_PATH+:$LD_LIBRARY_PATH}"
            echo "LIBRARY_PATH=$openslide_prefix/lib${LIBRARY_PATH+:$LIBRARY_PATH}"
            echo "RUSTFLAGS=-L native=$openslide_prefix/lib ${RUSTFLAGS:-}"
          } >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo Test
        run: cargo test --workspace --all-targets

  audit:
    name: Cargo Audit
    needs: skip-check
    if: needs.skip-check.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  packaging-smoke:
    name: Packaging Smoke Checks
    needs: skip-check
    if: needs.skip-check.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Validate packaging entrypoints
        shell: bash
        run: |
          set -euo pipefail
          bash -n packaging/appimage/build.sh
          bash -n packaging/macos/build.sh
          bash -n packaging/flatpak/build.sh
          bash -n packaging/shared/build-openslide.sh
          test -f packaging/appimage/AppRun
          test -f assets/macos/Info.plist
          test -f assets/linux/io.eosin.eov.desktop
          test -f assets/linux/io.eosin.eov.metainfo.xml
          test -d assets/linux/licenses
